<head>

    <title>Liyi Gao | Aspiring Product Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================
           [🌟 全新米白棕高级色调 (Arkitektkontoret Vest Style)]
           ========================================================== */
        :root {
            --bg-color: #F4F1EC; 
            --text-main: #2C2A29; 
            --text-muted: #7A7571; 
            --card-border: rgba(44, 42, 41, 0.1);
            --accent: #C28E75; 
            --timeline-bg: rgba(44, 42, 41, 0.15);
            --card-bg: #FFFFFF;
        }

        body.theme-light {
            --bg-color: #F4F1EC; --text-main: #2C2A29; --text-muted: #7A7571; --card-border: rgba(44, 42, 41, 0.1); --accent: #C28E75; --card-bg: #FFFFFF;
        }
        body.theme-brand {
            --bg-color: #E8EDE4; --text-main: #1F2E21; --text-muted: #566D5A; --card-border: rgba(31, 46, 33, 0.15); --accent: #4A7051; --card-bg: #FFFFFF;
        }
        body.theme-dark {
            --bg-color: #1E1D1C; --text-main: #F4F1EC; --text-muted: #A39D98; --card-border: rgba(244, 241, 236, 0.1); --accent: #D9A992; --card-bg: #2C2A29;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html, body { overflow-x: clip; scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; transition: background-color 0.8s ease, color 0.8s ease; }

        h1, h2, h3, .heading-font { font-family: 'Space Grotesk', sans-serif; }
        
        /* 增加隔离层，确保 mix-blend-mode 生效 */
        .section-wrapper, .hero, .timeline-node, .sandbox-card, .hobbies-section { 
            padding: 4rem 5%; max-width: 1300px; margin: 0 auto; position: relative; z-index: 10; isolation: isolate;
        }

        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.1s; } .delay-2 { transition-delay: 0.2s; }

        /* [🔥 彻底修复白底] 透明涂鸦贴纸样式 */
        .doodle-sticker { 
            position: absolute; width: 80px; height: auto; 
            z-index: -1; /* 保证贴纸在文字下方，绝对不挡文字 */
            pointer-events: none; 
            transform: rotate(-5deg);
            mix-blend-mode: multiply; /* 魔法滤镜：过滤白底，线条融入背景 */
            opacity: 0.7; 
        }
        body.theme-dark .doodle-sticker { filter: invert(1); mix-blend-mode: screen; opacity: 0.3;}
        
        /* 提升文字层级，防遮挡 */
        p, h3, h4, li, figcaption { position: relative; z-index: 2; }
